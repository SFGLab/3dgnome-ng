[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "gnome3d-torch"
version = "0.1.0"
description = "3dgnome reimplementation"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0.0",
    "numpy>=1.24.0",
]

[project.scripts]
gnome3d = "main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
