[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "3dgnome-ng"
version = "0.1.0"
description = "3dgnome reimplementation"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24.0",
    "numba>=0.59.0",
]

[project.scripts]
3dgnome-ng = "main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
