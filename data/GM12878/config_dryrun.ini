; Dryrun config: identical to config.ini except every stop_condition_steps is
; slashed to 2000 and every successes_threshold dropped to 1, so a full
; chromosome run finishes in seconds.  Use ONLY for smoke-testing tooling
; (profiling, CLI, etc.) — the resulting structures are garbage.

[main]
output_level = 2
random_walk = no
loop_density = 5

use_2D = no

max_pet_length = 1000000
long_pet_power = 2.0
long_pet_scale = 1.0

steps_lvl1 = 1
steps_lvl2 = 1
steps_arcs = 1
steps_smooth = 1

noise_lvl1 = 0.5
noise_lvl2 = 0.5
noise_arcs = 0.01
noise_smooth = 5.0

overlap_anchor_strict = no
drop_zero_length_subanchors = yes

use_dynamic_loop_density = yes
target_bp_per_subanchor = 1000
min_subanchors_per_arc = 0
max_subanchors_per_arc = 100

[cuda]
num_threads = 512
blocks_multiplier = 16
milestone_fails = 3

[data]
data_dir = /Projects/GM12878/
anchors = GM12878_anchors_3+_oriented.bed
clusters = GM12878_clusters_3+.bedpe
factors = CTCF
singletons = GM12878_singletons_lessthan3.bedpe
split_singleton_files_by_chr = no
singletons_inter = mock.txt
segment_split = ccds_all_hg38_merged100k_GM12878.breakpoints.bed
centromeres = hg38_centromeres.bed

[distance]
genomic_dist_power = 0.75
genomic_dist_scale = 0.5
genomic_dist_base = 1.0

freq_dist_scale = 25.0
freq_dist_power = -0.6

freq_dist_scale_inter = 120.0
freq_dist_power_inter = -1.0

count_dist_a = 0.2
count_dist_scale = 1.8
count_dist_shift = 8
count_dist_base_level = 0.2

[template]
template_scale = 7.0
dist_heatmap_scale = 15.0

[motif_orientation]
use_motif_orientation = yes
weight = 50.0

[anchor_heatmap]
use_anchor_heatmap = yes
heatmap_influence = 0.1

[subanchor_heatmap]
use_subanchor_heatmap = yes
estimate_distances_steps = 1
estimate_distances_replicates = 1
heatmap_influence = 0.1
heatmap_dist_weight = 0.01

[heatmaps]
inter_scaling = 1.0
distance_heatmap_stretching = 2.5

[springs]
stretch_constant = 0.1
squeeze_constant = 0.1
angular_constant = 0.1

stretch_constant_arcs = 1.0
squeeze_constant_arcs = 1.0

[simulation_backend]
ib_workers = 8
heatmap_chains = 1
smooth_chains = 1
; mc_backend = jax routes smooth-MC + EV to the JAX/CUDA kernel.  Requires
; `pip install gnome3d-ng[jax] "jax[cuda12]"`.  Gate refuses (falls back to
; numba with a warning) if the call has orientation, confinement, or heat
; enabled — none of which are currently supported under JAX.
mc_backend = jax

; --- LENIENT MC SETTINGS (everything below is dryrun-specific) ---

[simulation_ib]
use_ib_mc = yes
max_temp = 5.0
jump_temp_scale = 50.0
jump_temp_coef = 20.0
delta_temp = 0.999
stop_condition_improvement_threshold = 0.99
stop_condition_successes_threshold = 1
stop_condition_steps = 2000

[simulation_heatmap]
max_temp_heatmap = 5.0
delta_temp_heatmap = 0.999
jump_temp_scale_heatmap = 50.0
jump_temp_coef_heatmap = 20.0
stop_condition_improvement_threshold_heatmap = 0.99
stop_condition_successes_threshold_heatmap = 1
stop_condition_steps_heatmap = 2000

[simulation_arcs]
max_temp = 5.0
jump_temp_scale = 50.0
jump_temp_coef = 20.0
delta_temp = 0.999
stop_condition_improvement_threshold = 0.99
stop_condition_successes_threshold = 1
stop_condition_steps = 2000

[simulation_arcs_smooth]
dist_weight = 1.0
angle_weight = 1.0
max_temp = 5.0
jump_temp_scale = 50.0
jump_temp_coef = 20.0
delta_temp = 0.999
stop_condition_improvement_threshold = 0.99
stop_condition_successes_threshold = 1
stop_condition_steps = 2000

[excluded_volume]
use_excluded_volume = yes
weight = 0.1
apply_to_heatmap = yes
apply_to_arcs = yes
apply_to_smooth = yes

[confinement]
; apply_to_smooth disabled so the JAX backend can take the smooth-MC hot path.
; Confinement isn't a JAX-supported energy term yet — see [mc_jax.py].  If you
; need confinement on the smooth chain, set mc_backend = numba above.
use_confinement = yes
weight = 0.1
apply_to_arcs = yes
apply_to_smooth = no
apply_to_ib = yes
packing_factor_ib = 0.15

[small_ib_boost]
use_small_ib_boost = no
small_ib_threshold = 10
small_ib_spring_multiplier = 5.0
